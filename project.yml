name: LexendScholar
options:
  bundleIdPrefix: com.marlow
settings:
  base:
    SWIFT_VERSION: 6.0
targets:
  LexendScholar:
    type: application
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: app
    xcconfig: Config.xcconfig
    info:
      path: app/Info.plist
      properties:
        SUPABASE_URL: $(SUPABASE_URL)
        SUPABASE_ANON_KEY: $(SUPABASE_ANON_KEY)
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.marlow.lexendscholar
        PRODUCT_NAME: "Lexend Scholar"
        MARKETING_VERSION: 1.0
        CURRENT_PROJECT_VERSION: 1
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: "Lexend Scholar"
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight
        CODE_SIGN_STYLE: Automatic
        TARGETED_DEVICE_FAMILY: "1,2"
    dependencies:
      - sdk: Charts.framework
    entitlements:
      path: app/LexendScholar.entitlements
    capabilities:
      push-notifications: {}
