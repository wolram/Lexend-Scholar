<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-label="Dashboard do Lexend Scholar — visão geral da plataforma de gestão escolar">
  <!-- Background -->
  <rect width="800" height="500" rx="16" fill="#f1f3fd"/>

  <!-- Sidebar -->
  <rect x="0" y="0" width="180" height="500" rx="16" fill="#1a2634"/>
  <rect x="20" y="20" width="140" height="32" rx="8" fill="#137fec20"/>
  <text x="34" y="41" font-family="Lexend,system-ui,sans-serif" font-weight="700" font-size="13" fill="#a8c8ff">Lexend Scholar</text>

  <!-- Sidebar nav items -->
  <rect x="12" y="68" width="156" height="32" rx="8" fill="#137fec"/>
  <text x="30" y="89" font-family="system-ui,sans-serif" font-size="12" fill="white">Dashboard</text>
  <text x="30" y="125" font-family="system-ui,sans-serif" font-size="12" fill="#617589">Alunos</text>
  <text x="30" y="158" font-family="system-ui,sans-serif" font-size="12" fill="#617589">Professores</text>
  <text x="30" y="191" font-family="system-ui,sans-serif" font-size="12" fill="#617589">Turmas</text>
  <text x="30" y="224" font-family="system-ui,sans-serif" font-size="12" fill="#617589">Financeiro</text>
  <text x="30" y="257" font-family="system-ui,sans-serif" font-size="12" fill="#617589">Relatórios</text>
  <text x="30" y="290" font-family="system-ui,sans-serif" font-size="12" fill="#617589">Configurações</text>

  <!-- User avatar area -->
  <circle cx="30" cy="460" r="14" fill="#137fec40"/>
  <text x="30" y="465" font-family="system-ui,sans-serif" font-size="11" fill="#a8c8ff" text-anchor="middle">AD</text>
  <text x="52" y="457" font-family="system-ui,sans-serif" font-size="11" fill="#a8c8ff">Admin</text>
  <text x="52" y="470" font-family="system-ui,sans-serif" font-size="9" fill="#617589">Diretor</text>

  <!-- Top bar -->
  <rect x="192" y="12" width="596" height="44" rx="10" fill="white"/>
  <text x="212" y="38" font-family="Lexend,system-ui,sans-serif" font-weight="600" font-size="13" fill="#111418">Dashboard Geral</text>
  <rect x="640" y="20" width="130" height="28" rx="14" fill="#137fec"/>
  <text x="668" y="38" font-family="system-ui,sans-serif" font-size="11" fill="white" font-weight="600">+ Nova Matrícula</text>

  <!-- KPI Cards row -->
  <rect x="192" y="68" width="140" height="72" rx="10" fill="white"/>
  <text x="210" y="92" font-family="system-ui,sans-serif" font-size="10" fill="#617589">Alunos Ativos</text>
  <text x="210" y="120" font-family="Lexend,system-ui,sans-serif" font-weight="700" font-size="26" fill="#111418">1.284</text>
  <text x="280" y="130" font-family="system-ui,sans-serif" font-size="9" fill="#22c55e">+3,2%</text>

  <rect x="344" y="68" width="140" height="72" rx="10" fill="white"/>
  <text x="362" y="92" font-family="system-ui,sans-serif" font-size="10" fill="#617589">Freq. Média</text>
  <text x="362" y="120" font-family="Lexend,system-ui,sans-serif" font-weight="700" font-size="26" fill="#137fec">94,3%</text>

  <rect x="496" y="68" width="140" height="72" rx="10" fill="white"/>
  <text x="514" y="92" font-family="system-ui,sans-serif" font-size="10" fill="#617589">Inadimplência</text>
  <text x="514" y="120" font-family="Lexend,system-ui,sans-serif" font-weight="700" font-size="26" fill="#ef4444">3,2%</text>
  <text x="584" y="130" font-family="system-ui,sans-serif" font-size="9" fill="#22c55e">-0,4%</text>

  <rect x="648" y="68" width="140" height="72" rx="10" fill="white"/>
  <text x="666" y="92" font-family="system-ui,sans-serif" font-size="10" fill="#617589">Satisfação</text>
  <text x="666" y="120" font-family="Lexend,system-ui,sans-serif" font-weight="700" font-size="26" fill="#111418">98%</text>

  <!-- Chart area -->
  <rect x="192" y="152" width="380" height="200" rx="10" fill="white"/>
  <text x="212" y="178" font-family="Lexend,system-ui,sans-serif" font-weight="600" font-size="13" fill="#111418">Desempenho por Turma — 3º Bimestre</text>
  <!-- Chart bars -->
  <rect x="220" y="290" width="36" height="46" rx="4" fill="#dbeafe"/>
  <text x="238" y="350" font-family="system-ui,sans-serif" font-size="9" fill="#617589" text-anchor="middle">7A</text>
  <rect x="270" y="252" width="36" height="84" rx="4" fill="#137fec"/>
  <text x="288" y="350" font-family="system-ui,sans-serif" font-size="9" fill="#617589" text-anchor="middle">7B</text>
  <rect x="320" y="272" width="36" height="64" rx="4" fill="#dbeafe"/>
  <text x="338" y="350" font-family="system-ui,sans-serif" font-size="9" fill="#617589" text-anchor="middle">8A</text>
  <rect x="370" y="240" width="36" height="96" rx="4" fill="#137fec"/>
  <text x="388" y="350" font-family="system-ui,sans-serif" font-size="9" fill="#617589" text-anchor="middle">8B</text>
  <rect x="420" y="262" width="36" height="74" rx="4" fill="#dbeafe"/>
  <text x="438" y="350" font-family="system-ui,sans-serif" font-size="9" fill="#617589" text-anchor="middle">9A</text>
  <rect x="470" y="228" width="36" height="108" rx="4" fill="#137fec"/>
  <text x="488" y="350" font-family="system-ui,sans-serif" font-size="9" fill="#617589" text-anchor="middle">9B</text>

  <!-- Recent activity panel -->
  <rect x="584" y="152" width="204" height="200" rx="10" fill="white"/>
  <text x="604" y="178" font-family="Lexend,system-ui,sans-serif" font-weight="600" font-size="13" fill="#111418">Atividade Recente</text>
  <line x1="604" y1="190" x2="768" y2="190" stroke="#e5e7eb" stroke-width="1"/>
  <circle cx="622" cy="212" r="10" fill="#dbeafe"/>
  <text x="622" y="216" font-family="system-ui" font-size="9" fill="#0b5ed7" text-anchor="middle">AS</text>
  <text x="640" y="208" font-family="system-ui" font-size="10" fill="#111418">Ana S. fez login</text>
  <text x="640" y="220" font-family="system-ui" font-size="9" fill="#617589">2 min atrás</text>
  <circle cx="622" cy="244" r="10" fill="#e0e7ff"/>
  <text x="622" y="248" font-family="system-ui" font-size="9" fill="#4338ca" text-anchor="middle">BL</text>
  <text x="640" y="240" font-family="system-ui" font-size="10" fill="#111418">Boletim gerado</text>
  <text x="640" y="252" font-family="system-ui" font-size="9" fill="#617589">15 min atrás</text>
  <circle cx="622" cy="276" r="10" fill="#dbeafe"/>
  <text x="622" y="280" font-family="system-ui" font-size="9" fill="#0b5ed7" text-anchor="middle">R$</text>
  <text x="640" y="272" font-family="system-ui" font-size="10" fill="#111418">Mensalidade paga</text>
  <text x="640" y="284" font-family="system-ui" font-size="9" fill="#617589">1 h atrás</text>
  <circle cx="622" cy="308" r="10" fill="#dcfce7"/>
  <text x="622" y="312" font-family="system-ui" font-size="9" fill="#16a34a" text-anchor="middle">NM</text>
  <text x="640" y="304" font-family="system-ui" font-size="10" fill="#111418">Nova matrícula</text>
  <text x="640" y="316" font-family="system-ui" font-size="9" fill="#617589">2 h atrás</text>

  <!-- Bottom section — calendar preview -->
  <rect x="192" y="364" width="252" height="120" rx="10" fill="white"/>
  <text x="212" y="388" font-family="Lexend,system-ui,sans-serif" font-weight="600" font-size="12" fill="#111418">Próximos Eventos</text>
  <rect x="212" y="398" width="4" height="36" rx="2" fill="#137fec"/>
  <text x="224" y="412" font-family="system-ui" font-size="11" fill="#111418">Reunião de Pais</text>
  <text x="224" y="426" font-family="system-ui" font-size="10" fill="#617589">15 abr • 19h</text>
  <rect x="212" y="440" width="4" height="36" rx="2" fill="#4f46e5"/>
  <text x="224" y="454" font-family="system-ui" font-size="11" fill="#111418">Conselho de Classe</text>
  <text x="224" y="468" font-family="system-ui" font-size="10" fill="#617589">20 abr • 14h</text>

  <!-- Bottom right — notifications -->
  <rect x="456" y="364" width="332" height="120" rx="10" fill="white"/>
  <text x="476" y="388" font-family="Lexend,system-ui,sans-serif" font-weight="600" font-size="12" fill="#111418">Alertas</text>
  <rect x="476" y="400" width="292" height="28" rx="6" fill="#fee2e2"/>
  <text x="492" y="418" font-family="system-ui" font-size="11" fill="#991b1b">5 alunos com frequência abaixo de 75%</text>
  <rect x="476" y="434" width="292" height="28" rx="6" fill="#fef9c3"/>
  <text x="492" y="452" font-family="system-ui" font-size="11" fill="#713f12">12 mensalidades vencem em 3 dias</text>
  <rect x="476" y="468" width="292" height="10" rx="3" fill="#f1f3fd"/>
</svg>
