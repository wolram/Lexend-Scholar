<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="Lexend Scholar — Gestão Escolar Moderna para o Brasil">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f6f7f8"/>
      <stop offset="100%" style="stop-color:#dbeafe"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#137fec"/>
      <stop offset="100%" style="stop-color:#0b5ed7"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative circles -->
  <circle cx="1050" cy="100" r="200" fill="#137fec" opacity="0.06"/>
  <circle cx="150"  cy="530" r="180" fill="#137fec" opacity="0.05"/>

  <!-- Brand bar -->
  <rect x="0" y="0" width="8" height="630" fill="url(#accent)"/>

  <!-- Logo icon -->
  <rect x="80"  y="220" width="64" height="56" rx="8" fill="#137fec"/>
  <rect x="88"  y="230" width="48" height="36" rx="4" fill="#dbeafe"/>
  <rect x="96"  y="238" width="32" height="3" rx="1.5" fill="#137fec"/>
  <rect x="96"  y="245" width="24" height="3" rx="1.5" fill="#0b5ed7"/>
  <rect x="96"  y="252" width="28" height="3" rx="1.5" fill="#137fec"/>
  <rect x="111" y="230" width="3"  height="36" rx="1.5" fill="#137fec"/>

  <!-- Wordmark -->
  <text x="80" y="340" font-family="Lexend,system-ui,sans-serif" font-weight="800" font-size="64" fill="#111418" letter-spacing="-2">Lexend</text>
  <text x="80" y="410" font-family="Lexend,system-ui,sans-serif" font-weight="400" font-size="64" fill="#137fec" letter-spacing="-2">Scholar</text>

  <!-- Tagline -->
  <text x="80" y="470" font-family="system-ui,sans-serif" font-size="24" fill="#617589">Gestão Escolar Moderna para Instituições Brasileiras</text>

  <!-- Feature pills -->
  <rect x="80"  y="500" width="130" height="32" rx="16" fill="#137fec20"/>
  <text x="145" y="521" font-family="system-ui,sans-serif" font-size="13" fill="#0b5ed7" text-anchor="middle" font-weight="600">LGPD Compliant</text>

  <rect x="222" y="500" width="130" height="32" rx="16" fill="#137fec20"/>
  <text x="287" y="521" font-family="system-ui,sans-serif" font-size="13" fill="#0b5ed7" text-anchor="middle" font-weight="600">14 dias grátis</text>

  <rect x="364" y="500" width="160" height="32" rx="16" fill="#137fec20"/>
  <text x="444" y="521" font-family="system-ui,sans-serif" font-size="13" fill="#0b5ed7" text-anchor="middle" font-weight="600">Dados no Brasil</text>

  <!-- Dashboard mockup (right side) -->
  <rect x="700" y="60" width="460" height="510" rx="16" fill="white" opacity="0.8"/>
  <rect x="700" y="60" width="460" height="48" rx="16" fill="#1a2634"/>
  <rect x="700" y="88" width="460" height="20" fill="#1a2634"/>
  <circle cx="726" cy="84" r="6" fill="#ef4444" opacity="0.7"/>
  <circle cx="746" cy="84" r="6" fill="#f59e0b" opacity="0.7"/>
  <circle cx="766" cy="84" r="6" fill="#22c55e" opacity="0.7"/>
  <text x="860" y="89" font-family="system-ui" font-size="11" fill="#a8c8ff" text-anchor="middle">lexendscholar.com.br</text>

  <!-- Dashboard content -->
  <rect x="720" y="126" width="100" height="52" rx="8" fill="#f1f3fd"/>
  <text x="770" y="148" font-family="system-ui" font-size="9" fill="#617589" text-anchor="middle">Alunos</text>
  <text x="770" y="168" font-family="Lexend,system-ui" font-size="18" font-weight="700" fill="#111418" text-anchor="middle">1.284</text>

  <rect x="832" y="126" width="100" height="52" rx="8" fill="#f1f3fd"/>
  <text x="882" y="148" font-family="system-ui" font-size="9" fill="#617589" text-anchor="middle">Frequência</text>
  <text x="882" y="168" font-family="Lexend,system-ui" font-size="18" font-weight="700" fill="#137fec" text-anchor="middle">94%</text>

  <rect x="944" y="126" width="100" height="52" rx="8" fill="#f1f3fd"/>
  <text x="994" y="148" font-family="system-ui" font-size="9" fill="#617589" text-anchor="middle">Satisfação</text>
  <text x="994" y="168" font-family="Lexend,system-ui" font-size="18" font-weight="700" fill="#22c55e" text-anchor="middle">98%</text>

  <!-- Mini chart -->
  <rect x="720" y="192" width="324" height="160" rx="8" fill="#f6f7f8"/>
  <rect x="740" y="302" width="28" height="38" rx="3" fill="#dbeafe"/>
  <rect x="778" y="272" width="28" height="68" rx="3" fill="#137fec"/>
  <rect x="816" y="285" width="28" height="55" rx="3" fill="#dbeafe"/>
  <rect x="854" y="258" width="28" height="82" rx="3" fill="#137fec"/>
  <rect x="892" y="275" width="28" height="65" rx="3" fill="#dbeafe"/>
  <rect x="930" y="248" width="28" height="92" rx="3" fill="#137fec"/>
  <text x="870" y="215" font-family="Lexend,system-ui" font-size="11" font-weight="600" fill="#111418" text-anchor="middle">Desempenho por Turma</text>

  <!-- Domain badge -->
  <text x="960" y="575" font-family="system-ui" font-size="18" fill="#617589" text-anchor="end">lexendscholar.com.br</text>
</svg>
