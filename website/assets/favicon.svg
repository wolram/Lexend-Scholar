<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="Lexend Scholar favicon">
  <!-- Background rounded square -->
  <rect width="32" height="32" rx="7" fill="#137fec"/>

  <!-- Livro estilizado — letra L integrada -->
  <!-- Capa do livro (esquerda) -->
  <rect x="5" y="6" width="10" height="20" rx="2" fill="#dbeafe"/>
  <!-- Lombada -->
  <rect x="14" y="6" width="2" height="20" rx="1" fill="#0b5ed7"/>
  <!-- Capa direita com letra L estilizada -->
  <rect x="15" y="6" width="12" height="20" rx="2" fill="white" opacity="0.15"/>
  <!-- Linhas do texto (capa esquerda) -->
  <rect x="7"  y="11" width="6" height="1.5" rx="0.75" fill="#137fec"/>
  <rect x="7"  y="15" width="5" height="1.5" rx="0.75" fill="#0b5ed7"/>
  <rect x="7"  y="19" width="6" height="1.5" rx="0.75" fill="#137fec"/>
  <!-- L maiúsculo na capa direita -->
  <rect x="18" y="10" width="2.5" height="12" rx="1" fill="white"/>
  <rect x="18" y="20" width="7"   height="2.5" rx="1" fill="white"/>
</svg>
