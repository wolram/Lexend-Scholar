# .swiftlint.yml — LexendScholar
# Configuração do SwiftLint para o projeto iOS LexendScholar
# Swift 6, SwiftUI, iOS 18+
#
# Documentação: https://github.com/realm/SwiftLint

# ─── Diretórios incluídos no lint ────────────────────────────────────────────
included:
  - app
  - iosapp
  - tests

# ─── Diretórios excluídos ─────────────────────────────────────────────────────
excluded:
  - .build
  - Pods
  - Carthage
  - DerivedData
  - LexendScholar.xcodeproj
  - android
  - webapp
  - website

# ─── Regras desabilitadas ─────────────────────────────────────────────────────
disabled_rules:
  - trailing_whitespace         # Editores modernos tratam isso automaticamente
  - todo                        # TODOs são rastreados no Linear, não bloqueantes
  - multiple_closures_with_trailing_closure  # SwiftUI usa muito este padrão

# ─── Regras habilitadas além do padrão ───────────────────────────────────────
opt_in_rules:
  - array_init
  - attributes
  - closure_end_indentation
  - closure_spacing
  - collection_alignment
  - comma_inheritance
  - contains_over_filter_count
  - contains_over_filter_is_empty
  - contains_over_first_not_nil
  - contains_over_range_nil_comparison
  - convenience_type
  - discouraged_object_literal
  - discouraged_optional_boolean
  - empty_collection_literal
  - empty_count
  - empty_string
  - empty_xctest_method
  - enum_case_associated_values_count
  - expiring_todo
  - explicit_init
  - fallthrough
  - fatal_error_message
  - file_header
  - first_where
  - flatmap_over_map_reduce
  - force_unwrapping
  - identical_operands
  - joined_default_parameter
  - last_where
  - legacy_multiple
  - legacy_objc_type
  - literal_expression_end_indentation
  - local_doc_comment
  - lower_acl_than_parent
  - modifier_order
  - multiline_arguments
  - multiline_function_chains
  - multiline_literal_brackets
  - multiline_parameters
  - nimble_operator
  - no_extension_access_modifier
  - no_grouping_extension
  - number_separator
  - object_literal
  - operator_usage_whitespace
  - optional_enum_case_matching
  - overridden_super_call
  - override_in_extension
  - pattern_matching_keywords
  - period_spacing
  - prefer_self_in_static_references
  - prefer_self_type_over_type_of_self
  - prefer_zero_over_explicit_init
  - private_action
  - private_outlet
  - prohibited_interface_builder
  - prohibited_nan_comparison
  - prohibited_super_call
  - quick_discouraged_call
  - reduce_into
  - redundant_nil_coalescing
  - redundant_type_annotation
  - return_value_from_void_function
  - self_binding
  - shorthand_optional_binding
  - single_test_class
  - sorted_first_last
  - sorted_imports
  - static_operator
  - strong_iboutlet
  - switch_case_on_newline
  - toggle_bool
  - trailing_closure
  - type_contents_order
  - unavailable_function
  - unneeded_parentheses_in_closure_argument
  - unowned_variable_capture
  - untyped_error_in_catch
  - vertical_parameter_alignment_on_call
  - vertical_whitespace_between_cases
  - vertical_whitespace_closing_braces
  - vertical_whitespace_opening_braces
  - weak_delegate
  - xct_specific_matcher
  - yoda_condition

# ─── Configuração de regras ───────────────────────────────────────────────────

line_length:
  warning: 120
  error: 160
  ignores_urls: true
  ignores_comments: true
  ignores_interpolated_strings: true

type_body_length:
  warning: 300
  error: 500

file_length:
  warning: 500
  error: 1000
  ignore_comment_only_lines: true

function_body_length:
  warning: 50
  error: 100

function_parameter_count:
  warning: 6
  error: 8

type_name:
  min_length:
    warning: 3
    error: 2
  max_length:
    warning: 50
    error: 60

identifier_name:
  min_length:
    warning: 2
    error: 1
  max_length:
    warning: 60
    error: 80
  excluded:
    - id
    - db
    - vm
    - x
    - y
    - i
    - j
    - k

nesting:
  type_level: 2
  function_level: 3

cyclomatic_complexity:
  warning: 15
  error: 25

force_cast: warning
force_try: warning

large_tuple:
  warning: 3
  error: 4

number_separator:
  minimum_length: 5

multiline_arguments:
  first_argument_location: next_line
  only_enforce_after_first_closure_on_first_line: true

trailing_comma:
  mandatory_comma: true

vertical_whitespace:
  max_empty_lines: 2

modifier_order:
  preferred_modifier_order:
    - acl
    - setterACL
    - override
    - dynamic
    - mutating
    - lazy
    - final
    - required
    - convenience
    - typeMethods
    - owned

type_contents_order:
  order:
    - case
    - type_alias
    - associated_type
    - subtype
    - type_property
    - instance_property
    - ib_inspectable
    - ib_outlet
    - initializer
    - type_method
    - view_life_cycle_method
    - ib_action
    - other_method
    - subscript

file_header:
  required_pattern: |
                    \/\/
                    \/\/ .*?\.swift
                    \/\/ LexendScholar
                    \/\/
                    \/\/ .*

reporter: xcode
