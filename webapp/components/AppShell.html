<!DOCTYPE html>
<!--
  AppShell.html — Lexend Scholar Web App Shell
  Protótipo HTML do layout principal com navegação lateral.

  Em produção este layout é implementado como um React Server Component em:
    app/(app)/layout.tsx

  Inclui:
    - Sidebar com navegação por role
    - Topbar com search, notificações e perfil do usuário
    - Main content area com slot para páginas filhas
    - Mobile drawer (off-canvas sidebar)
    - Indicador de escola ativa (multi-tenant)
-->
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lexend Scholar</title>

  <!-- Tailwind CSS CDN (protótipo apenas — produção usa build local) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              50:  '#f0f4ff',
              100: '#e0eaff',
              500: '#4f6ef7',
              600: '#3a56e8',
              700: '#2d44cc',
              900: '#1a2880',
            }
          },
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif'],
          }
        }
      }
    }
  </script>

  <!-- Inter font -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    /* Sidebar active state */
    .nav-item.active {
      background-color: #e0eaff;
      color: #2d44cc;
      font-weight: 600;
    }
    .nav-item.active svg {
      color: #3a56e8;
    }
    /* Smooth mobile drawer */
    #mobile-sidebar {
      transition: transform 0.25s ease-in-out;
    }
    #mobile-sidebar.hidden-sidebar {
      transform: translateX(-100%);
    }
    /* Scrollbar slim */
    .slim-scroll::-webkit-scrollbar { width: 4px; }
    .slim-scroll::-webkit-scrollbar-track { background: transparent; }
    .slim-scroll::-webkit-scrollbar-thumb { background: #c7d2fe; border-radius: 9999px; }
  </style>
</head>

<body class="bg-gray-50 font-sans antialiased">

<!-- =========================================================

<!-- =========================================================
     SCRIPTS
     ========================================================= -->
<script>
  // Mobile sidebar
  function openMobileSidebar() {
    document.getElementById('mobile-overlay').classList.remove('hidden');
    document.getElementById('sidebar').classList.remove('hidden-sidebar');
  }
  function closeMobileSidebar() {
    document.getElementById('mobile-overlay').classList.add('hidden');
    document.getElementById('sidebar').classList.add('hidden-sidebar');
  }

  // User dropdown toggle
  document.getElementById('user-menu-btn').addEventListener('click', function () {
    document.getElementById('user-dropdown').classList.toggle('hidden');
  });

  // Close dropdown when clicking outside
  document.addEventListener('click', function (e) {
    const btn = document.getElementById('user-menu-btn');
    const dropdown = document.getElementById('user-dropdown');
    if (!btn.contains(e.target) && !dropdown.contains(e.target)) {
      dropdown.classList.add('hidden');
    }
  });

  // Active nav item highlighting
  (function highlightNav() {
    const path = window.location.pathname;
    document.querySelectorAll('.nav-item').forEach(function (item) {
      const href = item.getAttribute('href');
      item.classList.remove('active');
      if (href && (path === href || (href !== '/' && path.startsWith(href)))) {
        item.classList.add('active');
      }
    });
  })();

  // Sign out — calls Supabase signOut then redirects
  async function handleSignOut() {
    // In production: import { signOut } from '../auth/supabase-auth.js'
    // and call await signOut(); then router.push('/login');
    window.location.href = '/login';
  }

  // Populate user info from session (production: read from useAuth hook)
  function populateUserInfo(profile) {
    if (!profile) return;
    const initials = profile.name
      ? profile.name.split(' ').map(n => n[0]).slice(0, 2).join('').toUpperCase()
      : profile.email?.slice(0, 2).toUpperCase() || '??';
    document.getElementById('user-avatar').textContent = initials;
    document.getElementById('user-name').textContent = profile.name || profile.email;
    document.getElementById('user-role').textContent = {
      admin: 'Administrador', secretary: 'Secretaria',
      teacher: 'Professor', guardian: 'Responsável', student: 'Aluno'
    }[profile.role] || profile.role;
    if (profile.schoolName) {
      document.getElementById('school-name').textContent = profile.schoolName;
    }
  }

  // Demo: populate with mock data
  populateUserInfo({ name: 'João Silva', email: 'joao@escola.com', role: 'secretary', schoolName: 'Escola Modelo' });
</script>
</body>
