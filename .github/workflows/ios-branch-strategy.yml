name: iOS — Branch Build Strategy

# Este workflow implementa a estratégia de build por branch:
# - main       → build de PRODUÇÃO → TestFlight grupo "Produção"
# - feature/*  → build de BETA     → TestFlight grupo "Beta Testers"
#
# A lógica de routing é feita no job "set-environment" e passada
# como outputs para os jobs de build subsequentes.

on:
  push:
    branches:
      - main
      - 'feature/**'
    paths:
      - 'app/**'
      - 'iosapp/**'
      - 'project.yml'
      - '.github/workflows/ios-branch-strategy.yml'

concurrency:
  group: ios-branch-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Job 1: Determinar ambiente com base na branch ───────────────────────────
  set-environment:
    name: Determinar Ambiente
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.env.outputs.environment }}
      testflight_group: ${{ steps.env.outputs.testflight_group }}
      bundle_suffix: ${{ steps.env.outputs.bundle_suffix }}
      configuration: ${{ steps.env.outputs.configuration }}
      version_suffix: ${{ steps.env.outputs.version_suffix }}

    steps:
      - name: Resolver ambiente por branch
        id: env
        run: |
          BRANCH="${{ github.ref_name }}"
          echo "Branch detectada: $BRANCH"

          if [ "$BRANCH" = "main" ]; then
            echo "environment=production"            >> $GITHUB_OUTPUT
            echo "testflight_group=Produção"         >> $GITHUB_OUTPUT
            echo "bundle_suffix="                    >> $GITHUB_OUTPUT
            echo "configuration=Release"             >> $GITHUB_OUTPUT
            echo "version_suffix="                   >> $GITHUB_OUTPUT
            echo "==> Ambiente: PRODUÇÃO"
          else
            # feature/minha-feature → beta
            FEATURE_NAME=$(echo "$BRANCH" | sed 's|feature/||' | sed 's|/|-|g')
            echo "environment=beta"                            >> $GITHUB_OUTPUT
            echo "testflight_group=Beta Testers"              >> $GITHUB_OUTPUT
            echo "bundle_suffix=.beta"                        >> $GITHUB_OUTPUT
            echo "configuration=Release"                      >> $GITHUB_OUTPUT
            echo "version_suffix=-beta-${FEATURE_NAME}"      >> $GITHUB_OUTPUT
            echo "==> Ambiente: BETA (feature: $FEATURE_NAME)"
          fi

  # ─── Job 2: Build e distribuição condicionado ao ambiente ────────────────────
  build-and-distribute:
    name: Build (${{ needs.set-environment.outputs.environment }}) & Upload TestFlight
    runs-on: macos-15
    needs: set-environment
    timeout-minutes: 60
    environment: ${{ needs.set-environment.outputs.environment }}

    env:
      XCODE_PROJECT: LexendScholar.xcodeproj
      XCODE_SCHEME: LexendScholar
      BUILD_ENV: ${{ needs.set-environment.outputs.environment }}
      TESTFLIGHT_GROUP: ${{ needs.set-environment.outputs.testflight_group }}
      BUNDLE_ID_SUFFIX: ${{ needs.set-environment.outputs.bundle_suffix }}
      BUILD_CONFIGURATION: ${{ needs.set-environment.outputs.configuration }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Exibir estratégia de build
        run: |
          echo "============================================="
          echo "  AMBIENTE    : ${{ needs.set-environment.outputs.environment }}"
          echo "  BRANCH      : ${{ github.ref_name }}"
          echo "  TESTFLIGHT  : ${{ needs.set-environment.outputs.testflight_group }}"
          echo "  CONFIG      : ${{ needs.set-environment.outputs.configuration }}"
          echo "  BUNDLE SUF  : ${{ needs.set-environment.outputs.bundle_suffix }}"
          echo "============================================="

      - name: Instalar XcodeGen
        run: brew install xcodegen

      - name: Gerar Xcode Project
        run: xcodegen generate --spec project.yml

      - name: Configurar Bundle ID por ambiente
        run: |
          BASE_BUNDLE_ID="com.lexendscholar.app"
          if [ "$BUILD_ENV" = "beta" ]; then
            BUNDLE_ID="${BASE_BUNDLE_ID}.beta"
            echo "==> Bundle ID (beta): $BUNDLE_ID"
          else
            BUNDLE_ID="${BASE_BUNDLE_ID}"
            echo "==> Bundle ID (prod): $BUNDLE_ID"
          fi
          echo "BUNDLE_ID=$BUNDLE_ID" >> $GITHUB_ENV

      - name: Definir Build Number
        run: |
          BUILD_NUMBER=${{ github.run_number }}
          echo "==> Build number: $BUILD_NUMBER"
          echo "BUILD_NUMBER=$BUILD_NUMBER" >> $GITHUB_ENV

      - name: Instalar Certificado Apple
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security import $CERTIFICATE_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

      - name: Instalar Provisioning Profile
        env:
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
        run: |
          PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
          echo -n "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode -o $PP_PATH
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles

      - name: Arquivar (xcodebuild archive)
        run: |
          xcodebuild archive \
            -project ${{ env.XCODE_PROJECT }} \
            -scheme ${{ env.XCODE_SCHEME }} \
            -destination "generic/platform=iOS" \
            -archivePath $RUNNER_TEMP/LexendScholar.xcarchive \
            -configuration ${{ env.BUILD_CONFIGURATION }} \
            CURRENT_PROJECT_VERSION=${{ env.BUILD_NUMBER }} \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM=${{ secrets.APPLE_TEAM_ID }} \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="${{ secrets.PROVISIONING_PROFILE_NAME }}" \
            | xcpretty

      - name: Exportar IPA
        run: |
          cat > $RUNNER_TEMP/ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store-connect</string>
              <key>teamID</key>
              <string>${{ secrets.APPLE_TEAM_ID }}</string>
              <key>uploadSymbols</key>
              <true/>
              <key>signingStyle</key>
              <string>manual</string>
              <key>provisioningProfiles</key>
              <dict>
                  <key>${{ env.BUNDLE_ID }}</key>
                  <string>${{ secrets.PROVISIONING_PROFILE_NAME }}</string>
              </dict>
          </dict>
          </plist>
          EOF

          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/LexendScholar.xcarchive \
            -exportOptionsPlist $RUNNER_TEMP/ExportOptions.plist \
            -exportPath $RUNNER_TEMP/export \
            | xcpretty

      - name: Upload para TestFlight
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
        run: |
          API_KEY_PATH=$RUNNER_TEMP/AuthKey.p8
          echo -n "$APP_STORE_CONNECT_API_KEY_BASE64" | base64 --decode -o $API_KEY_PATH

          echo "==> Enviando para TestFlight (grupo: ${{ env.TESTFLIGHT_GROUP }})..."

          xcrun altool --upload-app \
            --type ios \
            --file "$RUNNER_TEMP/export/LexendScholar.ipa" \
            --apiKey "$APP_STORE_CONNECT_API_KEY_ID" \
            --apiIssuer "$APP_STORE_CONNECT_API_ISSUER_ID" \
            --apiKeyPath "$API_KEY_PATH"

          echo "==> Upload concluído para o grupo '${{ env.TESTFLIGHT_GROUP }}'"

      - name: Limpar Keychain
        if: always()
        run: |
          security delete-keychain $RUNNER_TEMP/app-signing.keychain-db 2>/dev/null || true

      - name: Sumário do build
        if: always()
        run: |
          echo "## iOS Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Campo | Valor |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Ambiente | **${{ needs.set-environment.outputs.environment }}** |" >> $GITHUB_STEP_SUMMARY
          echo "| TestFlight Group | ${{ needs.set-environment.outputs.testflight_group }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build Number | ${{ github.run_number }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
