name: Generate CHANGELOG

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  changelog:
    name: Update CHANGELOG.md
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # git-cliff precisa do histórico completo

      - name: Install git-cliff
        uses: taiki-e/install-action@v2
        with:
          tool: git-cliff@2

      - name: Generate CHANGELOG (latest changes only)
        run: |
          if git describe --tags --abbrev=0 2>/dev/null; then
            # Há tags — gerar somente os commits desde a última tag
            git-cliff --latest --prepend CHANGELOG.md
          else
            # Sem tags — gerar changelog completo desde o início
            git-cliff --unreleased --prepend CHANGELOG.md
          fi

      - name: Commit updated CHANGELOG
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: atualizar CHANGELOG.md [skip ci]"
          file_pattern: CHANGELOG.md
          commit_user_name: github-actions[bot]
          commit_user_email: github-actions[bot]@users.noreply.github.com

  release:
    name: Create GitHub Release on tag
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs: changelog

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install git-cliff
        uses: taiki-e/install-action@v2
        with:
          tool: git-cliff@2

      - name: Generate release notes for this tag
        id: release_notes
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          git-cliff --latest --strip all > release-notes.md
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_notes.outputs.tag }}
          name: "Release ${{ steps.release_notes.outputs.tag }}"
          body_path: release-notes.md
          draft: false
          prerelease: ${{ contains(github.ref, '-beta') || contains(github.ref, '-rc') || contains(github.ref, '-alpha') }}
