name: Build Website (Tailwind CSS)

on:
  push:
    branches: [main]
    paths:
      - 'website/**'
      - '.github/workflows/build-website.yml'
  pull_request:
    paths:
      - 'website/**'

jobs:
  build-tailwind:
    name: Compile Tailwind CSS
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: website

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: website/package-lock.json

      - name: Install dependencies
        run: npm ci --prefer-offline || npm install

      - name: Build Tailwind CSS
        run: npm run build

      - name: Upload compiled CSS artifact
        uses: actions/upload-artifact@v4
        with:
          name: website-css
          path: website/assets/css/style.css
          retention-days: 30

  # Garante que o build não quebra antes de merge
  validate-html:
    name: Validate HTML
    runs-on: ubuntu-latest
    needs: build-tailwind

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install htmlhint
        run: npm install -g htmlhint

      - name: Run HTMLHint on website pages
        run: |
          htmlhint website/*.html \
            --rules 'tagname-lowercase:true,attr-lowercase:true,attr-value-double-quotes:true,doctype-first:true,id-unique:true,src-not-empty:true,title-require:true' \
            || echo "HTMLHint completed with warnings (non-blocking)"
